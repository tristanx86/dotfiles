#? Seeded by install.sh. Per-core graphs, kernel processes shown, per-process
#  CPU as percent of a single core, CPU sort, network box visible. btop rewrites
#  this on exit; tweak live.

#* Use terminal background (matches the Tokyonight kitty theme).
color_theme = "Default"
theme_background = False
truecolor = True
vim_keys = True
rounded_corners = True
graph_symbol = "braille"

#* Boxes to show — keep the network box up for networking work.
shown_boxes = "cpu mem net proc"
update_ms = 1500

#* CPU box: one graph plus per-core meters, with frequency and temperatures.
cpu_single_graph = False
cpu_bottom = False
show_uptime = True
check_temp = True
show_coretemp = True
show_cpu_freq = True
clock_format = "%X"

#* Process box: sort by CPU, show kernel processes, count CPU% per single core.
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = True
proc_mem_bytes = True
proc_cpu_graphs = True
proc_filter_kernel = False
proc_aggregate = False

#* Memory box.
mem_graphs = True
show_swap = True
show_disks = True

#* Network box.
net_auto = True
net_sync = False

temp_scale = "celsius"
base_10_sizes = False
