# ── Fonts ────────────────────────────────────────────
font_family      FiraCode Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Fallback symbol font so every Nerd Font glyph renders — covers the full NF v3
# codepoint ranges even if FiraCode's patch misses some (fixes ? / □ icons).
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0C8,U+E0CA,U+E0CC-U+E0D7,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F372,U+F400-U+F532,U+F0001-U+F1AF0 Symbols Nerd Font Mono

# ── Window & Layout ──────────────────────────────────
background_opacity   1.0
window_padding_width 4
remember_window_size yes
initial_window_width 1000
initial_window_height 650

# ── System Integration ───────────────────────────────
shell zsh -l
# Allow writing to clipboard via OSC 52 (Required for SSH)
clipboard_control write-clipboard write-primary no-append

# ── Color Scheme (Tokyonight Night) ──────────────────
background #1a1b26
foreground #c0caf5
selection_background #283457
selection_foreground #c0caf5
url_color #73daca
cursor #c0caf5
cursor_text_color #1a1b26

# Black
color0 #15161e
color8 #414868
# Red
color1 #f7768e
color9 #f7768e
# Green
color2 #9ece6a
color10 #9ece6a
# Yellow
color3 #e0af68
color11 #e0af68
# Blue
color4 #7aa2f7
color12 #7aa2f7
# Magenta
color5 #bb9af7
color13 #bb9af7
# Cyan
color6 #7dcfff
